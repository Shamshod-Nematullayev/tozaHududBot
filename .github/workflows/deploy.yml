name: Deploy to VPS Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Show which server we deploy to
        run: echo "Deploying to ${{ secrets.SERVER_HOST }}"

      - name: Deploy to VPS and restart bot
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true # ❗️ agar bitta buyruq xato bersa — workflow to‘xtaydi
          script: |
            cd /root/toza-hudud-bot || exit 1
            echo "🌀 Pulling latest code..."
            git pull origin main
            echo "📦 Installing dependencies..."
            yarn install --frozen-lockfile
            echo "🏗️ Building project..."
            yarn run build
            echo "🚀 Restarting bot..."
            pm2 restart toza-hudud-bot
            echo "✅ Deployment finished successfully!"
